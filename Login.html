<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Yassin">
    <meta name="keywords" content="login, student collaboration">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
  </head>
  <body>
    <header>
    <h1>Login Menu</h1>
    </header>
    <hr>
    <form action="Profile.html">
      <div>
        <p><label for="UsernameOrEmail">Enter your username or email</label></p>
        <input type="text" id="UsernameOrEmail" required>
      </div>
      <br>
      <div>
        <p><label for="pwd">Enter your password</label></p>
        <input type="password" id="pwd" required>
      </div>
      <br><br>
      <input type="submit">

      <hr>
    </form>
  </body>
</html>
